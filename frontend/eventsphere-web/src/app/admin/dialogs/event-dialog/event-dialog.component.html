<h2 mat-dialog-title>{{ data.mode === 'create' ? 'Create event' : 'Edit event' }}</h2>

<div mat-dialog-content class="content">
  <form [formGroup]="form" class="form">
    <mat-form-field appearance="outline">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <textarea matInput rows="4" formControlName="description"></textarea>
    </mat-form-field>

    <div class="row2">
      <mat-form-field appearance="outline">
        <mat-label>Location</mat-label>
        <input matInput formControlName="location" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Category</mat-label>
        <mat-select formControlName="categoryId">
          <mat-option value="">Uncategorized</mat-option>
          @for (c of categories; track c.id) {
            <mat-option [value]="c.id">{{ c.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <div class="row2">
      <mat-form-field appearance="outline">
        <mat-label>Start (UTC ISO)</mat-label>
        <input matInput formControlName="startUtc" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>End (UTC ISO)</mat-label>
        <input matInput formControlName="endUtc" />
      </mat-form-field>
    </div>

    <div class="row2">
      <mat-form-field appearance="outline">
        <mat-label>Price</mat-label>
        <input matInput type="number" formControlName="price" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Capacity</mat-label>
        <input matInput type="number" formControlName="capacity" />
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Cover image URL (optional)</mat-label>
      <input matInput formControlName="coverImageUrl" />
    </mat-form-field>
  </form>
</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="save()" [disabled]="form.invalid">
    <mat-icon>save</mat-icon>
    Save
  </button>
</div>
