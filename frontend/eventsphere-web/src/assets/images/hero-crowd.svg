<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="650" viewBox="0 0 1600 650">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.32"/>
      <stop offset="0.55" stop-color="#0F172A" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.20"/>
    </linearGradient>
    <radialGradient id="spot" cx="20%" cy="25%" r="70%">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>
  <rect width="1600" height="650" fill="#0F172A"/>
  <rect width="1600" height="650" fill="url(#bg)"/>
  <rect width="1600" height="650" fill="url(#spot)" filter="url(#blur)"/>

  <!-- abstract concert crowd lines -->
  <g opacity="0.22" stroke="#F8FAFC" stroke-width="2">
    <path d="M0,520 C160,470 260,560 420,520 C560,485 680,545 820,520 C980,490 1140,540 1280,510 C1430,480 1520,510 1600,490" fill="none"/>
    <path d="M0,560 C180,500 280,600 450,555 C600,520 720,585 880,565 C1020,548 1140,585 1285,560 C1420,538 1510,565 1600,545" fill="none"/>
  </g>

  <!-- neon streaks -->
  <g opacity="0.45">
    <path d="M120,130 C300,30 480,60 640,120" stroke="#7C3AED" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M980,80 C1100,30 1250,60 1430,150" stroke="#22C55E" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M540,50 C650,70 720,140 820,170" stroke="#F59E0B" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
</svg>

