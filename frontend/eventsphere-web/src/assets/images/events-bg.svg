    <path d="M360 0 V520"/>
    <path d="M480 0 V520"/>
    <path d="M600 0 V520"/>
    <path d="M720 0 V520"/>
    <path d="M840 0 V520"/>
    <path d="M960 0 V520"/>
    <path d="M1080 0 V520"/>
    <path d="M1200 0 V520"/>
    <path d="M1320 0 V520"/>
    <path d="M1440 0 V520"/>
  </g>
</svg>

