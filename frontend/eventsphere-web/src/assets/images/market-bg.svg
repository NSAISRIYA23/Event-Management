<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.22"/>
      <stop offset="0.52" stop-color="#0F172A" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.20"/>
    </linearGradient>
    <radialGradient id="r" cx="15%" cy="25%" r="60%">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="520" fill="#0F172A"/>
  <rect width="1600" height="520" fill="url(#g)"/>
  <rect width="1600" height="520" fill="url(#r)"/>

  <!-- floating cards -->
  <g opacity="0.35" stroke="#F8FAFC" stroke-width="2" fill="none">
    <rect x="140" y="110" width="340" height="210" rx="28"/>
    <rect x="520" y="70" width="310" height="190" rx="26"/>
    <rect x="870" y="140" width="380" height="250" rx="30"/>
    <rect x="280" y="320" width="420" height="140" rx="30"/>
  </g>

  <!-- badges -->
  <g opacity="0.55">
    <circle cx="1260" cy="95" r="18" fill="#7C3AED"/>
    <circle cx="1312" cy="155" r="12" fill="#22C55E"/>
    <circle cx="1140" cy="350" r="16" fill="#F59E0B"/>
  </g>
</svg>

